enrichplot = ">=1.18.0"
patchwork = ">=1.1.2"

[system_requirements]
fastqc = ">=0.11.9"
trimmomatic = ">=0.39"
bwa = ">=0.7.17"
samtools = ">=1.12"
macs2 = ">=2.2.7.1"
bedtools = ">=2.30.0"
